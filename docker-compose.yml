# Plex Smash Deck — copy .env.example to .env, edit secrets, then: docker compose up -d
#
# Use a published image instead of build: set image: ghcr.io/<owner>/plex-smash-deck:<tag> and remove build:.
services:
  plex-smash-deck:
    build:
      context: .
      dockerfile: Dockerfile
    image: plex-smash-deck:local
    ports:
      - "${PORT:-8081}:${PORT:-8081}"
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8081}
    volumes:
      - plexdash_data:/app/data
    restart: unless-stopped

volumes:
  plexdash_data:
