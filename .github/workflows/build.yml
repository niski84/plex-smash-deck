name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  readme-gallery:
    name: README gallery in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README Screenshots section matches images/manifest.json
        run: python3 scripts/generate_readme_images.py --check

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w" \
            -o "dist/plex-smash-deck-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/plex-dashboard

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plex-smash-deck-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Release
    needs: [build, windows_installer]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  windows_installer:
    name: Windows NSIS Installer
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows binary and package files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/winpkg/web -Force | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags="-s -w" -o "dist/winpkg/plex-dashboard.exe" ./cmd/plex-dashboard
          Copy-Item -Path "web/plex-dashboard" -Destination "dist/winpkg/web" -Recurse -Force

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPP_VERSION=$version" `
            "/DSOURCE_DIR=dist\winpkg" `
            "/DOUT_FILE=dist\plex-smash-deck-$version-windows-x64-setup.exe" `
            "packaging\windows\plex-smash-deck.nsi"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: plex-smash-deck-windows-installer
          path: dist/plex-smash-deck-*-windows-x64-setup.exe
