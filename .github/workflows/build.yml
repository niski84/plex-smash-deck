name: Build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  readme-gallery:
    name: README gallery in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify README Screenshots section (images/manifest.json + docs/images/*.meta.json)
        run: python3 scripts/generate_readme_images.py --check

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -trimpath -ldflags="-s -w" \
            -o "dist/plex-smash-deck-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}" \
            ./cmd/plex-dashboard

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: plex-smash-deck-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    name: Release
    needs: [build, windows_installer]
    # Publish binaries even if the Windows NSIS job fails (e.g. Docker/Linux users still get a release).
    if: >
      always() && startsWith(github.ref, 'refs/tags/v') &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  windows_installer:
    name: Windows NSIS Installer
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Windows binary and package files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist/winpkg/web -Force | Out-Null
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -trimpath -ldflags="-s -w" -o "dist/winpkg/plex-dashboard.exe" ./cmd/plex-dashboard
          Copy-Item -Path "web/plex-dashboard" -Destination "dist/winpkg/web" -Recurse -Force

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      # makensis sets cwd to the script directory, so SOURCE_DIR/OUT_FILE must be absolute.
      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $root = "${{ github.workspace }}"
          $source = Join-Path $root "dist\winpkg"
          $out = Join-Path $root "dist\plex-smash-deck-$version-windows-x64-setup.exe"
          $script = Join-Path $root "packaging\windows\plex-smash-deck.nsi"
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DAPP_VERSION=$version" `
            "/DSOURCE_DIR=$source" `
            "/DOUT_FILE=$out" `
            $script

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: plex-smash-deck-windows-installer
          path: dist/plex-smash-deck-*-windows-x64-setup.exe

  docker-verify:
    name: Docker image (build check)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-publish:
    name: Docker image (GHCR)
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: lower
        run: echo "repository_lower=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
        shell: bash

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.lower.outputs.repository_lower }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=true

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max
