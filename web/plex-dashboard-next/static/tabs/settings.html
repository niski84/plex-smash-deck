<div id="settings-panel" x-data="settingsTab()" x-init="init()" class="space-y-6">
  <div x-show="loading" class="flex items-center gap-2 text-zinc-500 text-sm">
    <span class="loading loading-spinner loading-sm"></span> Loading settings…
  </div>
  <div x-show="!loading" class="space-y-6">

    <!-- Plex -->
    <div class="rounded-2xl border border-white/10 bg-zinc-900/40 p-6 space-y-4">
      <h2 class="font-mono text-xs uppercase tracking-widest" style="color:#e5a00d">🎬 Plex</h2>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="block space-y-1 md:col-span-2"><span class="text-xs text-zinc-500">Plex Base URL</span>
          <input type="url" x-model="cfg.PlexBaseURL" placeholder="http://192.168.1.x:32400" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1 md:col-span-2"><span class="text-xs text-zinc-500">Plex Token</span>
          <input type="password" x-model="cfg.PlexToken" placeholder="••••••••••••••••" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Movie Library Key</span>
          <input type="text" x-model="cfg.LibraryKey" placeholder="1" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">TV Library Key</span>
          <input type="text" x-model="cfg.TVLibraryKey" placeholder="2" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Target Player</span>
          <select x-model="cfg.TargetClientName" class="select select-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60">
            <option value="">— select player —</option>
            <template x-for="p in players" :key="p.Name||p"><option :value="p.Name||p" x-text="p.Name||p"></option></template>
            <option :value="cfg.TargetClientName" x-show="cfg.TargetClientName" x-text="cfg.TargetClientName+' (current)'"></option>
          </select></label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" x-model="cfg.AutoTargetDetected" class="checkbox checkbox-sm"/>
          <span class="text-sm text-zinc-300">Auto-detect target from sessions</span></label>
      </div>
    </div>

    <!-- Branding -->
    <div class="rounded-2xl border border-white/10 bg-zinc-900/40 p-6 space-y-4">
      <h2 class="font-mono text-xs uppercase tracking-widest" style="color:#a855f7">🎨 Branding</h2>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="block space-y-1"><span class="text-xs text-zinc-500">App Display Name</span>
          <input type="text" x-model="cfg.AppDisplayName" placeholder="Plex Dashboard" class="input input-bordered w-full text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Hero Banner URL</span>
          <input type="url" x-model="cfg.HeroBannerURL" placeholder="https://…" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Banner Height (px)</span>
          <input type="number" x-model.number="cfg.HeroBannerHeight" placeholder="200" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" x-model="cfg.HeroBannerHidden" class="checkbox checkbox-sm"/>
          <span class="text-sm text-zinc-300">Hide Hero Banner</span></label>
      </div>
    </div>

    <!-- Fanart.tv -->
    <div class="rounded-2xl border border-white/10 bg-zinc-900/40 p-6 space-y-4">
      <h2 class="font-mono text-xs uppercase tracking-widest" style="color:#38bdf8">🖼 Fanart.tv</h2>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="flex items-center gap-3 cursor-pointer md:col-span-2">
          <input type="checkbox" x-model="cfg.FanartEnabled" class="checkbox checkbox-sm"/>
          <span class="text-sm text-zinc-300">Enable Fanart.tv banners</span></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">API Key</span>
          <input type="password" x-model="cfg.FanartAPIKey" placeholder="••••••••••••••••" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Client Key</span>
          <input type="password" x-model="cfg.FanartClientKey" placeholder="••••••••••••••••" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Banner Cache Max (MB)</span>
          <input type="number" x-model.number="cfg.FanartBannerCacheMaxMB" placeholder="500" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Banner Art Refresh</span>
          <select x-model="cfg.BannerArtRefresh" class="select select-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60">
            <option value="5m">5 minutes</option><option value="10m">10 minutes</option><option value="30m">30 minutes</option>
            <option value="1h">1 hour</option><option value="3h">3 hours</option><option value="8h">8 hours</option>
            <option value="24h">24 hours</option><option value="48h">48 hours</option><option value="1w">1 week</option><option value="once">Once only</option>
          </select></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Banner Rotate Interval</span>
          <select x-model="cfg.BannerRotateInterval" class="select select-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60">
            <option value="5m">5 minutes</option><option value="10m">10 minutes</option><option value="30m">30 minutes</option>
            <option value="1h">1 hour</option><option value="3h">3 hours</option><option value="8h">8 hours</option>
            <option value="24h">24 hours</option><option value="48h">48 hours</option><option value="1w">1 week</option><option value="once">Once only</option>
          </select></label>
      </div>
    </div>

    <!-- TMDB -->
    <div class="rounded-2xl border border-white/10 bg-zinc-900/40 p-6 space-y-4">
      <h2 class="font-mono text-xs uppercase tracking-widest" style="color:#01d277">🎬 TMDB</h2>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="block space-y-1"><span class="text-xs text-zinc-500">API Key</span>
          <input type="password" x-model="cfg.TMDBAPIKey" placeholder="••••••••••••••••" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Read Token</span>
          <input type="password" x-model="cfg.TMDBReadToken" placeholder="••••••••••••••••" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
      </div>
    </div>

    <!-- OMDb -->
    <div class="rounded-2xl border border-white/10 bg-zinc-900/40 p-6 space-y-4">
      <h2 class="font-mono text-xs uppercase tracking-widest" style="color:#eab308">⭐ OMDb</h2>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="block space-y-1"><span class="text-xs text-zinc-500">API Key</span>
          <input type="password" x-model="cfg.OMDbAPIKey" placeholder="••••••••••••••••" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" x-model="cfg.OMDbBlendRatings" class="checkbox checkbox-sm"/>
          <span class="text-sm text-zinc-300">Blend OMDb ratings</span></label>
      </div>
    </div>

    <!-- Radarr -->
    <div class="rounded-2xl border border-white/10 bg-zinc-900/40 p-6 space-y-4">
      <h2 class="font-mono text-xs uppercase tracking-widest" style="color:#00b4d8">📥 Radarr</h2>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="flex items-center gap-3 cursor-pointer md:col-span-2">
          <input type="checkbox" x-model="cfg.RadarrEnabled" class="checkbox checkbox-sm"/>
          <span class="text-sm text-zinc-300">Enable Radarr integration</span></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Radarr URL</span>
          <input type="url" x-model="cfg.RadarrURL" placeholder="http://localhost:7878" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">API Key</span>
          <input type="password" x-model="cfg.RadarrAPIKey" placeholder="••••••••••••••••" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Root Folder</span>
          <input type="text" x-model="cfg.RadarrRootFolder" placeholder="/movies" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Quality Profile ID</span>
          <input type="number" x-model.number="cfg.RadarrProfileID" placeholder="1" class="input input-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60"/></label>
      </div>
    </div>

    <!-- Snapshots -->
    <div class="rounded-2xl border border-white/10 bg-zinc-900/40 p-6 space-y-4">
      <h2 class="font-mono text-xs uppercase tracking-widest" style="color:#94a3b8">📸 Snapshots</h2>
      <div class="grid gap-4 md:grid-cols-2">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" :checked="!cfg.SnapshotDisabled" @change="cfg.SnapshotDisabled=!$event.target.checked" class="checkbox checkbox-sm"/>
          <span class="text-sm text-zinc-300">Enable daily snapshots</span></label>
        <label class="block space-y-1"><span class="text-xs text-zinc-500">Snapshot Hour (0–23)</span>
          <select x-model.number="cfg.SnapshotHour" class="select select-bordered w-full font-mono text-sm bg-zinc-950 border-white/10 text-white focus:border-primary/60">
            <template x-for="h in Array.from({length:24},(_,i)=>i)" :key="h">
              <option :value="h" x-text="h+':00'"></option>
            </template>
          </select></label>
      </div>
    </div>

    <!-- Save -->
    <div class="flex items-center gap-4">
      <button @click="save()" :disabled="saving" class="btn btn-gold">
        <span x-show="saving" class="loading loading-spinner loading-xs"></span>
        <span x-show="!saving">Save Settings</span>
      </button>
      <span x-show="status" x-text="status" class="text-sm" :class="status.startsWith('Error')?'text-rose-400':'text-emerald-400'"></span>
    </div>

  </div>
</div>
