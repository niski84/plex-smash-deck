<div x-data="snapshotsTab()" x-init="init()" class="space-y-6 max-w-3xl">
  <div class="flex flex-wrap items-center gap-3">
    <button @click="takeSnapshot()" :disabled="loading" class="btn btn-sm btn-gold">📸 Take Snapshot</button>
    <button @click="refresh()" :disabled="loading" class="btn btn-sm btn-ghost text-zinc-400">
      <span x-show="!loading">↻ Refresh</span><span x-show="loading" class="loading loading-spinner loading-xs"></span>
    </button>
    <span x-show="status" x-text="status" class="text-sm" :class="status.startsWith('Error')?'text-rose-400':'text-emerald-400'"></span>
  </div>

  <div x-show="missing.length>0" class="rounded-xl border border-amber-700/50 bg-amber-950/20 p-4 space-y-2">
    <p class="text-xs font-mono uppercase tracking-widest text-amber-500">Missing Movies</p>
    <p class="text-sm text-amber-300" x-text="missing.length+' movies missing from library'"></p>
    <ul class="max-h-40 overflow-y-auto space-y-0.5">
      <template x-for="(m,idx) in missing.slice(0,20)" :key="m.Title||idx">
        <li class="text-xs text-amber-200/70" x-text="m.Title+(m.Year?' ('+m.Year+')':'')"></li>
      </template>
      <li x-show="missing.length>20" class="text-xs text-amber-600 italic" x-text="'… and '+(missing.length-20)+' more'"></li>
    </ul>
  </div>

  <div x-show="latestDiff" class="rounded-2xl border border-white/10 bg-zinc-900/40 p-5 space-y-3">
    <h3 class="font-mono text-xs uppercase tracking-widest text-zinc-500">Latest Changes</h3>
    <div class="flex gap-6">
      <div><p class="text-xs text-zinc-500">Added</p><p class="text-lg font-semibold text-emerald-400" x-text="latestDiff?.added?.length||0"></p></div>
      <div><p class="text-xs text-zinc-500">Removed</p><p class="text-lg font-semibold text-rose-400" x-text="latestDiff?.removed?.length||0"></p></div>
    </div>
    <div x-show="(latestDiff?.added||[]).length>0" class="space-y-1">
      <p class="text-xs text-zinc-600">New additions:</p>
      <ul class="space-y-0.5">
        <template x-for="(t,i) in (latestDiff?.added||[]).slice(0,5)" :key="t.title||i">
          <li class="text-xs text-emerald-300" x-text="t.title+(t.year?' ('+t.year+')':'')"></li>
        </template>
        <li x-show="(latestDiff?.added||[]).length>5" class="text-xs text-zinc-600 italic" x-text="'… and '+((latestDiff?.added||[]).length-5)+' more'"></li>
      </ul>
    </div>
    <div x-show="(latestDiff?.removed||[]).length>0" class="space-y-1">
      <p class="text-xs text-zinc-600">Removed:</p>
      <ul class="space-y-0.5">
        <template x-for="(t,i) in (latestDiff?.removed||[]).slice(0,5)" :key="t.title||i">
          <li class="text-xs text-rose-300" x-text="t.title+(t.year?' ('+t.year+')':'')"></li>
        </template>
        <li x-show="(latestDiff?.removed||[]).length>5" class="text-xs text-zinc-600 italic" x-text="'… and '+((latestDiff?.removed||[]).length-5)+' more'"></li>
      </ul>
    </div>
  </div>

  <div x-show="snapshots.length>0" class="overflow-x-auto rounded-xl border border-white/10">
    <table class="table table-sm w-full">
      <thead class="bg-zinc-900/80">
        <tr>
          <th class="text-zinc-500 font-mono text-xs">#</th><th class="text-zinc-500 font-mono text-xs">Captured</th>
          <th class="text-zinc-500 font-mono text-xs">Movies</th><th class="text-zinc-500 font-mono text-xs">Change</th>
        </tr>
      </thead>
      <tbody>
        <template x-for="(s,idx) in snapshots" :key="s.id||idx">
          <tr>
            <td class="text-zinc-600 text-xs" x-text="idx+1"></td>
            <td class="text-zinc-300 text-sm" x-text="fmtDate(s.capturedAt)"></td>
            <td class="text-zinc-200 text-sm" x-text="s.count||'—'"></td>
            <td class="text-xs font-mono" :class="(s.netChange||0)>0?'text-emerald-400':(s.netChange||0)<0?'text-rose-400':'text-zinc-600'" x-text="fmtChange(s.netChange||0)"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
  <div x-show="snapshots.length===0&&!loading" class="text-center py-12 text-zinc-600 text-sm italic">No snapshots yet</div>

  <div x-show="snapshots.length>=2" class="rounded-2xl border border-white/10 bg-zinc-900/40 p-5 space-y-4">
    <h3 class="font-mono text-xs uppercase tracking-widest text-zinc-500">Compare Snapshots</h3>
    <div class="flex flex-wrap gap-3 items-end">
      <label class="block space-y-1"><span class="text-xs text-zinc-500">From</span>
        <select x-model="compareFrom" class="select select-sm bg-zinc-950 border-zinc-700 text-zinc-100 focus:outline-none">
          <option value="">Select…</option>
          <template x-for="(s,idx) in snapshots" :key="s.id||idx"><option :value="s.id||s.capturedAt" x-text="fmtDate(s.capturedAt)"></option></template>
        </select></label>
      <label class="block space-y-1"><span class="text-xs text-zinc-500">To</span>
        <select x-model="compareTo" class="select select-sm bg-zinc-950 border-zinc-700 text-zinc-100 focus:outline-none">
          <option value="">Select…</option>
          <template x-for="(s,idx) in snapshots" :key="s.id||idx"><option :value="s.id||s.capturedAt" x-text="fmtDate(s.capturedAt)"></option></template>
        </select></label>
      <button @click="compare()" :disabled="!compareFrom||!compareTo" class="btn btn-sm btn-blue">Compare</button>
    </div>
    <div x-show="diffResult" class="space-y-3">
      <div class="flex gap-6">
        <div><p class="text-xs text-zinc-500">Added</p><p class="text-lg font-semibold text-emerald-400" x-text="diffResult?.addedCount||(diffResult?.added||[]).length||0"></p></div>
        <div><p class="text-xs text-zinc-500">Removed</p><p class="text-lg font-semibold text-rose-400" x-text="diffResult?.removedCount||(diffResult?.removed||[]).length||0"></p></div>
      </div>
      <div x-show="(diffResult?.added||[]).length>0">
        <p class="text-xs text-zinc-500 mb-1">Added:</p>
        <ul class="space-y-0.5 max-h-40 overflow-y-auto">
          <template x-for="(t,i) in (diffResult?.added||[])" :key="t.title||i"><li class="text-xs text-emerald-300" x-text="t.title+(t.year?' ('+t.year+')':'')"></li></template>
        </ul>
      </div>
      <div x-show="(diffResult?.removed||[]).length>0">
        <p class="text-xs text-zinc-500 mb-1">Removed:</p>
        <ul class="space-y-0.5 max-h-40 overflow-y-auto">
          <template x-for="(t,i) in (diffResult?.removed||[])" :key="t.title||i"><li class="text-xs text-rose-300" x-text="t.title+(t.year?' ('+t.year+')':'')"></li></template>
        </ul>
      </div>
    </div>
  </div>
</div>
